# Testset catalog — shared across all config variants
# Update the placeholder paths below to match your local dataset locations.

VCTK_DEMAND: # simple denoising subtask
    metrics: ['pesq', 'stoi', 'lsd', 'sdr', 'mcd',
              'wvmos', 'utmos', 'dnsmos',
              'bleu', 'bertscore', 'tokendist']
    sample_rate_src: 16000
    sample_rate_in: 16000
    clean_dir: "/home/DB/VCTK_DEMAND/clean_testset_wav"
    noisy_dir: "/home/DB/VCTK_DEMAND/noisy_testset_wav"
    random_sample_idx: [10, 20, 30, 40, 50]

VCTK_SR: # simple super-resolution subtask
    metrics: ['lsd', 'mcd', 'utmos']
    sample_rate_src: 44100
    sample_rate_in: 8000
    clean_dir: "/home/DB/VCTK-Corpus-0.92/test"
    noisy_dir: "/home/DB/VCTK-Corpus-0.92/test"
    random_sample_idx: [10, 20, 30, 40, 50]

UNIVERSE: # general speech restoration
    metrics: ['pesq', 'stoi', 'lsd', 'sdr', 'mcd',
              'wvmos', 'utmos', 'dnsmos',
              'bleu', 'bertscore', 'tokendist']
    sample_rate_src: 16000
    sample_rate_in: 16000
    clean_dir: "/home/DB/UNIVERSE/target"
    noisy_dir: "/home/DB/UNIVERSE/input"
    random_sample_idx: [10, 20, 30, 40, 50]

VoxCeleb: # Real datatest
    metrics: ['wvmos', 'utmos', 'dnsmos']
    sample_rate_src: 16000
    sample_rate_in: 16000 # None means that the model can process various input sampling rates / # ! Must be none not None.
    clean_dir: null
    noisy_dir: "/home/DB/VoxCeleb_sample_50_SE"
    random_sample_idx: [10, 20, 30, 40, 50]

